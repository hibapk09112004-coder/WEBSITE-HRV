<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESP32 ECG Monitoring Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <div class="app-shell">
    <!-- Header -->
    <div class="topbar">
      <div>
        <p class="eyebrow">Health Monitoring</p>
        <h1>HRV Monitor</h1>
      </div>
      <div class="status-section">
        <div class="status-pill" id="device-status">Device Offline</div>
      </div>
    </div>

    <!-- Summary Cards -->
    <div class="summary-panel">
      <div class="summary-card">
        <h2>Status</h2>
        <p id="status-text">Waiting for connection...</p>
        <small id="last-update" class="small-text">Last update: --</small>
      </div>
      <div class="summary-card">
        <h2>Connection Age</h2>
        <p id="connection-age">--</p>
      </div>
      <div class="summary-card">
        <h2 id="status-indicator"><span class="status-dot" id="status-dot"></span> Indicator</h2>
        <p id="indicator-text">Initializing...</p>
      </div>
    </div>

    <!-- Dashboard Grid -->
    <div class="grid-panel">
      <!-- Heart Rate Card -->
      <div class="dashboard-card">
        <div class="card-header">
          <span>Heart Rate</span>
          <span class="status-dot" id="heartRate-dot"></span>
        </div>
        <div class="card-value" id="heartRate">--</div>
        <p class="card-label">BPM</p>
        <p class="card-status" id="heartRate-status">Waiting</p>
      </div>

      <!-- SpO2 Card -->
      <div class="dashboard-card">
        <div class="card-header">
          <span>SpO2</span>
          <span class="status-dot" id="spo2-status-dot"></span>
        </div>
        <div class="card-value" id="spo2">--</div>
        <p class="card-label">%</p>
        <p class="card-status" id="spo2-status">Waiting</p>
      </div>

      <!-- HRV Card -->
      <div class="dashboard-card">
        <div class="card-header">
          <span>HRV</span>
          <span class="status-dot" id="hrv-dot"></span>
        </div>
        <div class="card-value" id="hrv">--</div>
        <p class="card-label">ms</p>
        <p class="card-status" id="hrv-status">Waiting</p>
      </div>

      <!-- ECG Status Card -->
      <div class="dashboard-card">
        <div class="card-header">
          <span>ECG Status</span>
          <span class="status-dot" id="ecg-dot"></span>
        </div>
        <div class="card-value" id="ecgStatus">--</div>
        <p class="card-status" id="ecg-status-text">Waiting</p>
      </div>

      <!-- Fall Detection Card -->
      <div class="dashboard-card">
        <div class="card-header">
          <span>Fall Detection</span>
          <span class="status-dot" id="fall-dot"></span>
        </div>
        <div class="card-value" id="fallDetected">--</div>
        <p class="card-status" id="fall-status-text">Waiting</p>
      </div>

      <!-- Battery Card -->
      <div class="dashboard-card">
        <div class="card-header">
          <span>Battery</span>
          <span class="status-dot" id="battery-dot"></span>
        </div>
        <div class="card-value" id="battery">--</div>
        <p class="card-label">%</p>
        <p class="card-status" id="battery-status">Waiting</p>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
